<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerFit</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin:0;
      padding-bottom:60px;
      color:#fff;
      background: url('background.jfif') no-repeat center center fixed;
      background-size: cover;
      position: relative;
      z-index: 0;
    }

    /* Overlay escuro translúcido com blur */
    body::before {
      content: "";
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: -1;
    }

    header { text-align:center; padding:20px; background:#111; font-size:1.6em; font-weight:bold; color:silver; border-bottom:3px solid #fd7e14; }
    .tabs { display:flex; justify-content:center; margin:10px; }
    .tabs button { flex:1; padding:10px; border:none; cursor:pointer; background:#222; color:#fff; }
    .tabs button.active { background:#fd7e14; }
    .container { padding:15px; }
    .exercise {
      margin-bottom:15px;
      background:rgba(253,126,20,0.15);
      padding:12px;
      border-radius:12px;
      border-left:5px solid #fd7e14;
    }
    label { font-weight:bold; color:#ffa94d; }
    input[type="text"], input[type="number"] {
      width:100%; padding:8px; margin-top:5px;
      border-radius:8px; border:1px solid #444;
      background:rgba(30,30,30,0.6); color:#fff;
    }
    .series-container { margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; }
    .round-checkbox {
      appearance:none; width:22px; height:22px;
      border:2px solid #fd7e14; border-radius:50%;
      background:rgba(30,30,30,0.6); cursor:pointer;
    }
    .round-checkbox:checked { background:#fd7e14; }
    .buttons { display:flex; flex-direction:column; gap:20px; margin-top:20px; }
    button.main {
      padding:12px;
      background:rgba(253,126,20,0.25);
      color:#fff; font-weight:bold;
      border:none; border-radius:12px;
      cursor:pointer; transition:0.3s;
    }
    button.main:hover { background:rgba(253,126,20,0.4); }
    #output {
      margin-top:20px;
      background:rgba(253,126,20,0.1);
      padding:15px; border-radius:12px;
      border:2px solid #fd7e14;
    }
    #progress { margin-top:10px; }

    /* Responsividade para mobile */
    body, input, button, label {
      font-size:clamp(0.9em, 2.5vw, 1.2em);
    }
    @media (max-width: 480px) {
      .tabs button {
        font-size:clamp(0.8em, 3vw, 1em);
        padding:12px;
      }
      button.main {
        width:100%;
        font-size:clamp(0.9em, 3vw, 1.1em);
      }
      .round-checkbox {
        width:26px;
        height:26px;
        margin:4px;
      }
    }

    footer {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:rgba(17,17,17,0.6);
      backdrop-filter: blur(6px);
      color:silver;
      text-align:center;
      padding:5px;
      font-size:0.7em;
      border-top:2px solid #fd7e14;
    }
  </style>
</head>
<body>
  <header>💪 TREINO BOOSTER</header>

  <div class="tabs">
    <button class="active" onclick="switchWorkout('A')">Treino A</button>
    <button onclick="switchWorkout('B')">Treino B</button>
    <button onclick="switchWorkout('C')">Treino C</button>
  </div>

  <div class="container" id="exercise-list"></div>

  <div class="buttons">
    <button class="main" onclick="addExercise()">+ Adicionar Exercício</button>
    <button class="main" onclick="generateWorkout()">📋 Gerar Treino Completo</button>
    <button class="main" onclick="confirmReset()">🔄 Resetar Treino</button>
  </div>

  <div id="output"></div>
  <div id="progress"></div>
  <script>
    let workouts = { A: [], B: [], C: [] };
    let currentWorkout = "A";

    function saveWorkouts() {
      const exercises = [];
      document.querySelectorAll('.exercise').forEach(ex => {
        const name = ex.querySelector('input[type=text]').value;
        const series = ex.querySelectorAll('input[type=number]')[0].value;
        const reps = ex.querySelectorAll('input[type=number]')[1].value;
        const done = Array.from(ex.querySelectorAll('.round-checkbox')).map(cb => cb.checked);
        exercises.push({ name, series, reps, done });
      });
      workouts[currentWorkout] = exercises;
      localStorage.setItem("workouts", JSON.stringify(workouts));
    }

    function loadWorkouts() {
      const saved = localStorage.getItem("workouts");
      if (saved) {
        workouts = JSON.parse(saved);
        renderExercises(workouts[currentWorkout]);
      }
    }

    function renderExercises(exercises) {
      const container = document.getElementById('exercise-list');
      container.innerHTML = "";
      if (!exercises) return;
      exercises.forEach(ex => {
        const div = document.createElement('div');
        div.classList.add('exercise');
        div.innerHTML = `
          <label>Exercício:</label>
          <input type="text" value="${ex.name}">
          <label>Séries:</label>
          <input type="number" min="1" max="10" value="${ex.series}" onchange="generateCheckboxes(this)">
          <label>Repetições:</label>
          <input type="number" min="1" max="30" value="${ex.reps}">
          <div class="series-container"></div>
        `;
        container.appendChild(div);
        const seriesContainer = div.querySelector(".series-container");
        for (let i = 0; i < ex.series; i++) {
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.classList.add("round-checkbox");
          cb.checked = ex.done[i] || false;
          cb.onchange = () => { updateProgress(); saveWorkouts(); };
          seriesContainer.appendChild(cb);
        }
      });
      updateProgress();
    }

    function switchWorkout(type) {
      saveWorkouts();
      currentWorkout = type;
      document.querySelectorAll(".tabs button").forEach(btn => btn.classList.remove("active"));
      document.querySelector(`.tabs button:nth-child(${type==='A'?1:type==='B'?2:3})`).classList.add("active");
      renderExercises(workouts[currentWorkout]);
    }
    function generateCheckboxes(input) {
      const count = parseInt(input.value);
      const container = input.parentElement.querySelector(".series-container");
      container.innerHTML = "";
      for (let i = 0; i < count; i++) {
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.classList.add("round-checkbox");
        cb.onchange = () => { updateProgress(); saveWorkouts(); };
        container.appendChild(cb);
      }
      updateProgress();
      saveWorkouts();
    }

    function updateProgress() {
      const checkboxes = document.querySelectorAll('.round-checkbox');
      const total = checkboxes.length;
      const done = document.querySelectorAll('.round-checkbox:checked').length;
      const percent = total ? Math.round((done/total)*100) : 0;
      document.getElementById('progress').innerHTML = `Progresso: ${percent}% concluído`;
    }

    function generateWorkout() {
      const exercises = workouts[currentWorkout];
      let result = `<h3>🔥 Treino ${currentWorkout} 🔥</h3>`;
      exercises.forEach(ex => {
        result += `<p>${ex.name} — ${ex.series} séries de ${ex.reps} repetições</p>`;
      });
      document.getElementById('output').innerHTML = result;
    }

    function confirmReset() {
      if (confirm("Tem certeza que deseja redefinir o treino?")) {
        document.getElementById('exercise-list').innerHTML = "";
        document.getElementById('output').innerHTML = "";
        document.getElementById('progress').innerHTML = "";
        workouts[currentWorkout] = [];
        saveWorkouts();
      }
    }

    // Aviso de inatividade (PC e celular)
    function checkInactivity() {
      const lastAccess = localStorage.getItem("lastAccess");
      const now = Date.now();

      if (lastAccess) {
        const diffDays = Math.floor((now - parseInt(lastAccess)) / (1000 * 60 * 60 * 24));
        if (diffDays >= 2) {
          alert("⚠️ Você está há 2 dias sem treinar!");
        }
      }

      localStorage.setItem("lastAccess", now);
    }

    // Executa ao abrir o app
    window.onload = function() {
      loadWorkouts();
      checkInactivity();
    };
  </script>

  <footer>
    2026 Desenvolvido por @ndakkota
  </footer>
</body>
</html>
