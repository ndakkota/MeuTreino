<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerFit</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: Arial, sans-serif; background:#000; color:#fff; margin:0; }
    header { text-align:center; padding:20px; background:#111; font-size:1.6em; font-weight:bold; color:silver; border-bottom:3px solid red; }
    .tabs { display:flex; justify-content:center; margin:10px; }
    .tabs button { flex:1; padding:10px; border:none; cursor:pointer; background:#222; color:#fff; }
    .tabs button.active { background:red; }
    .container { padding:15px; }
    .exercise { margin-bottom:15px; background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; border-left:5px solid red; }
    label { font-weight:bold; color:#ff4444; }
    input[type="text"], input[type="number"] { width:100%; padding:8px; margin-top:5px; border-radius:8px; border:1px solid #444; background:rgba(30,30,30,0.6); color:#fff; }
    .series-container { margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; }
    .round-checkbox { appearance:none; width:22px; height:22px; border:2px solid red; border-radius:50%; background:rgba(30,30,30,0.6); cursor:pointer; }
    .round-checkbox:checked { background:red; }
    .buttons { display:flex; flex-direction:column; gap:20px; margin-top:20px; } /* espaçamento maior */
    button.main { padding:12px; background:linear-gradient(to bottom,#ff0000,#990000); color:#fff; font-weight:bold; border:none; border-radius:8px; cursor:pointer; }
    #output { margin-top:20px; background:rgba(20,20,20,0.6); padding:15px; border-radius:12px; border:2px solid red; }
    #progress { margin-top:10px; }
    .whatsapp-btn { width:auto; padding:4px; background:#25D366; border:none; border-radius:20%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .whatsapp-btn img { width:18px; height:18px; }
  </style>
</head>
<body>
  <header>🏋️‍♂️ TREINO BOOST</header>

  <div class="tabs">
    <button class="active" onclick="switchWorkout('A')">Treino A</button>
    <button onclick="switchWorkout('B')">Treino B</button>
    <button onclick="switchWorkout('C')">Treino C</button>
  </div>

  <div class="container" id="exercise-list"></div>

  <div class="buttons">
    <button class="main" onclick="addExercise()">+ Adicionar Exercício</button>
    <button class="main" onclick="generateWorkout()">📋 Gerar Treino Completo</button>
    <button class="main" onclick="confirmReset()">🔄 Resetar Treino</button>
    <button class="whatsapp-btn" onclick="shareWorkout()">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
    </button>
  </div>

  <div id="output"></div>
  <div id="progress"></div>
  <div id="history"></div>

  <script>
    let currentWorkout = "A";

    function addExercise() {
      const container = document.getElementById('exercise-list');
      const div = document.createElement('div');
      div.classList.add('exercise');
      div.innerHTML = `
        <label>Exercício:</label>
        <input type="text" placeholder="Digite o exercício">
        <label>Séries:</label>
        <input type="number" min="1" max="12" value="2" onchange="generateCheckboxes(this)">
        <label>Repetições:</label>
        <input type="number" min="1" max="30" value="12">
        <div class="series-container"></div>
      `;
      container.appendChild(div);
    }

    function generateCheckboxes(input) {
  const count = parseInt(input.value);
  const container = input.closest('.exercise').querySelector('.series-container');
  container.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.classList.add("round-checkbox");
    cb.onchange = updateProgress;
    container.appendChild(cb);
  }
  updateProgress();
}


    function updateProgress() {
      const checkboxes = document.querySelectorAll('.round-checkbox');
      const total = checkboxes.length;
      const done = document.querySelectorAll('.round-checkbox:checked').length;
      const percent = total ? Math.round((done/total)*100) : 0;
      document.getElementById('progress').innerHTML = `Progresso: ${percent}% concluído`;
    }

    function generateWorkout() {
      const exercises = document.querySelectorAll('.exercise');
      let result = `<h3>🔥 Treino de Hoje${currentWorkout} 🔥</h3><ul>`;
      exercises.forEach(ex => {
        const name = ex.querySelector('input[type=text]').value;
        const series = ex.querySelectorAll('input[type=number]')[0].value;
        const reps = ex.querySelectorAll('input[type=number]')[1].value;
        const done = ex.querySelectorAll('.round-checkbox:checked').length;
        result += `<li>${name} - ${series} séries de ${reps} repetições (concluídas: ${done})</li>`;
      });
      result += "</ul>";
      document.getElementById('output').innerHTML = result;
    }

    function confirmReset() {
      if (confirm("Tem certeza que deseja redefinir o treino?")) {
        resetWorkout();
      }
    }

    function resetWorkout() {
      document.getElementById('exercise-list').innerHTML = "";
      document.getElementById('output').innerHTML = "";
      document.getElementById('progress').innerHTML = "";
    }

    function shareWorkout() {
      const text = document.getElementById('output').innerText || "Treino vazio";
      const url = "https://wa.me/?text=" + encodeURIComponent(text);
      window.open(url, "_blank");
    }

    // Aviso motivacional
    function updateLastAccess() {
      localStorage.setItem("lastAccess", new Date().toISOString());
    }
    function checkAccess() {
      const lastAccess = localStorage.getItem("lastAccess");
      if (lastAccess) {
        const diffDays = (new Date() - new Date(lastAccess)) / (1000*60*60*24);
        if (diffDays >= 2) {
          alert("Quer ir conhecer o Dr. Now? VAI TREINAR!");
        }
      }
      updateLastAccess();
    }
    checkAccess();

    // Registrar service worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
