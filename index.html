<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerFit</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-container">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.5 7.5C7.32843 7.5 8 6.82843 8 6C8 5.17157 7.32843 4.5 6.5 4.5C5.67157 4.5 5 5.17157 5 6C5 6.82843 5.67157 7.5 6.5 7.5Z" fill="#fd7e14"/>
        <path d="M17.5 7.5C18.3284 7.5 19 6.82843 19 6C19 5.17157 18.3284 4.5 17.5 4.5C16.6716 4.5 16 5.17157 16 6C16 6.82843 16.6716 7.5 17.5 7.5Z" fill="#fd7e14"/>
        <path d="M2 9C2 8.44772 2.44772 8 3 8H21C21.5523 8 22 8.44772 22 9V11C22 11.5523 21.5523 12 21 12H19V15C19 16.6569 17.6569 18 16 18H8C6.34315 18 5 16.6569 5 15V12H3C2.44772 12 2 11.5523 2 11V9ZM7 12V15C7 15.5523 7.44772 16 8 16H16C16.5523 16 17 15.5523 17 15V12H7Z" fill="#ffffff"/>
      </svg>
      <span>POWER<span class="accent-text">FIT</span></span>
    </div>
  </header>

  <div id="rest-timer-banner" class="timer-banner" style="display: none;">
    <span class="timer-label">⏱️ DESCANSO:</span>
    <span id="timer-countdown">60s</span>
    <button class="timer-skip-btn" onclick="skipTimer()">Pular</button>
  </div>

  <div id="dashboard" class="dashboard">
    <h2>📊 Resumo da Semana</h2>
    <p id="weekly-progress">Treinos concluídos na semana: 0</p>
    <p id="last-workout">Último treino: nenhum</p>
    <p id="motivational">"Seja sua própria inspiração!"</p>
  </div>

  <div class="tabs">
    <button id="btn-tab-A" class="active" onclick="switchWorkout('A')">Treino A</button>
    <button id="btn-tab-B" onclick="switchWorkout('B')">Treino B</button>
    <button id="btn-tab-C" onclick="switchWorkout('C')">Treino C</button>
    <button id="btn-tab-Hist" onclick="renderHistory()">Histórico</button>
  </div>

  <div class="container" id="exercise-list"></div>
  <div class="container" id="history-list" style="display:none;"></div>

  <div id="progress">Progresso: 0% concluído</div>
  <div id="output"></div>

  <div class="buttons-group">
    <button class="main" id="btn-add" onclick="addExercise()">+ Adicionar Exercício</button>
    <button class="main" onclick="generateWorkout()">📋 Concluir e Gerar Treino</button>
    
    <div class="action-row">
      <button class="main reset-layout-btn" onclick="confirmReset()">🔄 Resetar Treino</button>
      <button class="whatsapp-btn" onclick="sendToWhatsApp()" title="Enviar via WhatsApp">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
      </button>
    </div>
  </div>

<footer>
    <div class="footer-content">
      <span>2026 Desenvolvido por @ndakkota</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
